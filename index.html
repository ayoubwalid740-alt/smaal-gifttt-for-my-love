<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 Eman App</title>

<style>
body{
    margin:0;
    font-family: Arial;
    overflow:hidden;
    text-align:center;
    background: linear-gradient(45deg,#ffd6e0,#ff9ab3);
    background-size:400% 400%;
    animation: bgMove 8s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

.page{
    position:absolute;
    width:100%;
    height:100vh;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    opacity:0;
    transform:scale(0.95);
    transition:0.5s ease;
}

.active{
    display:flex;
    opacity:1;
    transform:scale(1);
}

.box{
    background: rgba(255,255,255,0.3);
    padding:30px;
    border-radius:25px;
    backdrop-filter: blur(15px);
    color:#ff2e63;
    box-shadow:0 0 25px rgba(255,0,80,0.3);
    max-height:85vh;
    overflow:auto;
}

h2{
    font-size:28px;
    color:#ff2e63;
    text-shadow:0 0 10px pink;
}

p{
    font-size:18px;
    color:#ff4d88;
    line-height:1.7;
}

button{
    padding:12px 18px;
    margin:8px;
    border:none;
    border-radius:20px;
    background:#ff2e63;
    color:white;
    cursor:pointer;
    transition:0.2s;
}

button:hover{transform:scale(1.1);}
button:active{transform:scale(0.95);}

input{
    padding:10px;
    border-radius:15px;
    border:none;
    margin:10px;
    text-align:center;
    background:#ffe6f0;
    color:#ff2e63;
}

/* قلوب */
.heart{
    position:absolute;
    bottom:-20px;
    animation: float 6s linear forwards, spin 5s linear infinite;
}

@keyframes float{
    0%{transform:translateY(100vh) scale(0.5);opacity:0;}
    30%{opacity:1;}
    100%{transform:translateY(-10vh) scale(1.2);opacity:0;}
}

@keyframes spin{
    0%{rotate:0deg;}
    100%{rotate:360deg;}
}
</style>
</head>

<body>

<!-- الصفحة 1 -->
<div class="page active" id="p1">
    <div class="box">
        <h2>💖 إلى إيمان</h2>
        <p>أنتِ حياتي وكل شيء جميل فيها ❤️</p>
        <button onclick="go('p2')">🎬 دخول</button>
    </div>
</div>

<!-- الصفحة 2 -->
<div class="page" id="p2">
    <div class="box">
        <h2 id="msg">💖 أحبك يا إيمان</h2>
        <button onclick="love()">💞 اضغطي هنا</button>
        <button onclick="go('p3')">🔐 رسالة سرية</button>
        <button onclick="go('p5')">🎧 رسالة صوتية</button>
        <button onclick="go('p1')">⬅ رجوع</button>
    </div>
</div>

<!-- صفحة السر -->
<div class="page" id="p3">
    <div class="box">
        <h2>🔐 كلمة السر</h2>
        <input id="pass" placeholder="اكتبي كلمة السر">
        <button onclick="check()">دخول</button>
        <button onclick="go('p2')">⬅ رجوع</button>
    </div>
</div>

<!-- الصفحة الخاصة -->
<div class="page" id="p4">
    <div class="box">
        <h2>💖 رسالة خاصة</h2>
        <p>
(ضع النص الطويل هنا كما هو)
        </p>
        <button onclick="go('p2')">⬅ رجوع</button>
    </div>
</div>

<!-- صفحة الصوت -->
<div class="page" id="p5">
    <div class="box">
        <h2>🎧 رسالة صوتية</h2>

        <audio controls style="width:90%;">
            <source src="voice.m4a" type="audio/mp4">
            متصفحك لا يدعم الصوت
        </audio>

        <br><br>
        <button onclick="go('p2')">⬅ رجوع</button>
    </div>
</div>

<script>
let messages=["أحبك جدًا 💖","أنتِ روحي ❤️","أنتِ عالمي 💕","أشتاق إليك 💞","أنتِ أجمل شيء في حياتي 💖"];

function go(id){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function love(){
    let msg=document.getElementById("msg");
    msg.innerText=messages[Math.floor(Math.random()*messages.length)];
    burst();
}

function check(){
    let v=document.getElementById("pass").value;
    if(v==="إيمان"){go("p4");}
    else{alert("❌ كلمة السر غير صحيحة");}
}

function createHeart(){
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="💖";
    h.style.left=Math.random()*100+"vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
}

function burst(){
    for(let i=0;i<20;i++){
        setTimeout(createHeart,i*20);
    }
}

setInterval(createHeart,500);
</script>

</body>
</html>
